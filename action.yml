# action.yml
name: 'Hugo rsync deployment'
description: 'An action that generates and deploys a static website using Hugo and rsync.'
branding:
  icon: 'upload-cloud'
  color: 'blue'

inputs:
  hugo-version:
    description: 'Hugo version to install and use'
    required: false
    default: '0.160.1'
  hugo-arguments:
    description: 'Hugo arguments'
    required: false
    default: '--minify'
  hugo-config:
    description: 'Hugo config file name to inject current git commit hash (placeholder: @@@COMMIT@@@). Leave empty to skip.'
    required: false
    default: ''
  rsync-arguments:
    description: 'Rsync arguments'
    required: false
    default: '--archive --compress --delete'
  robots-txt-source:
    description: 'Path to robots.txt (relative to repo root) to copy into public/ after Hugo build. Leave empty to skip.'
    required: false
    default: ''

runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.hugo-arguments }}
    - ${{ inputs.rsync-arguments }}
    - ${{ inputs.hugo-version }}
    - ${{ inputs.hugo-config }}
    - ${{ inputs.robots-txt-source }}
